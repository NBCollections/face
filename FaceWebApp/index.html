<!DOCTYPE html>
<html>
<head>
  <title>Face Recognition</title>

  <!-- FACE API (FIXED) -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <!-- FIREBASE COMPAT (NO ERRORS) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: #1f1f1f;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .box {
      margin: auto;
      padding: 20px;
      background: #2c2c2c;
      width: 720px;
      border-radius: 15px;
    }

    video {
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Face Recognition System</h2>

  <video id="video" width="640" height="480" autoplay muted></video><br>

  <input type="text" id="name" placeholder="Enter Name">
  <button onclick="saveFace()">Add Face</button>
  <button onclick="startRecognition()">Start</button>

  <div id="status">Loading models...</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBYjut7RJMj4oJYo9y9nm_2Li691Qt6aCI",
  authDomain: "facerecog-dc727.firebaseapp.com",
  projectId: "facerecog-dc727"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const video = document.getElementById('video');
const statusText = document.getElementById('status');

// ✅ LOAD MODELS (CORRECT PATHS)
async function loadModels() {
  await faceapi.nets.ssdMobilenetv1.loadFromUri('/models/ssd_mobilenetv1');
  await faceapi.nets.faceRecognitionNet.loadFromUri('/models/face_recognition');
  await faceapi.nets.faceLandmark68Net.loadFromUri('/models/face_landmark_68');
  statusText.innerText = "Models Loaded";
}

async function startVideo() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

// INIT
window.onload = async () => {
  await loadModels();
  await startVideo();
};

// 🎯 ADD FACE
async function saveFace() {
  const name = document.getElementById('name').value;
  if (!name) return alert("Enter name");

  const steps = ["Look Straight", "Turn Right", "Turn Left"];

  for (let step of steps) {
    for (let i = 3; i > 0; i--) {
      statusText.innerText = step + " in " + i;
      await new Promise(r => setTimeout(r, 1000));
    }

    const detection = await faceapi.detectSingleFace(video)
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (!detection) {
      alert("Face not detected");
      return;
    }

    await db.collection("faces").add({
      name: name,
      descriptor: Array.from(detection.descriptor)
    });
  }

  statusText.innerText = "Saved 3 samples!";
}

// 🎯 RECOGNITION
async function startRecognition() {
  statusText.innerText = "Loading faces...";

  const snapshot = await db.collection("faces").get();
  const map = {};

  snapshot.forEach(doc => {
    const d = doc.data();
    if (!map[d.name]) map[d.name] = [];
    map[d.name].push(new Float32Array(d.descriptor));
  });

  const labeled = Object.keys(map).map(name =>
    new faceapi.LabeledFaceDescriptors(name, map[name])
  );

  const matcher = new faceapi.FaceMatcher(labeled, 0.5);

  statusText.innerText = "Running...";

  const canvas = faceapi.createCanvasFromMedia(video);
  document.body.append(canvas);

  const size = { width: video.width, height: video.height };
  faceapi.matchDimensions(canvas, size);

  setInterval(async () => {
    const detections = await faceapi.detectAllFaces(video)
      .withFaceLandmarks()
      .withFaceDescriptors();

    const resized = faceapi.resizeResults(detections, size);

    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

    resized.forEach(d => {
      const match = matcher.findBestMatch(d.descriptor);

      new faceapi.draw.DrawBox(d.detection.box, {
        label: match.toString()
      }).draw(canvas);
    });

  }, 120);
}
</script>

</body>
</html>
