<!DOCTYPE html>
<html>
<head>
  <title>Face Recognition</title>

  <!-- Face API -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    video {
      border-radius: 10px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h2>Face Recognition</h2>

<video id="video" width="640" height="480" autoplay muted></video><br>

<input id="name" placeholder="Enter Name">
<button onclick="saveFace()">Add Face</button>
<button onclick="startRecognition()">Start</button>

<p id="status">Loading...</p>

<script>
const status = document.getElementById("status");
const video = document.getElementById("video");

const firebaseConfig = {
  apiKey: "AIzaSyBYjut7RJMj4oJYo9y9nm_2Li691Qt6aCI",
  authDomain: "facerecog-dc727.firebaseapp.com",
  projectId: "facerecog-dc727"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOAD MODELS
async function loadModels() {
  status.innerText = "Loading models...";
  await faceapi.nets.ssdMobilenetv1.loadFromUri('./models/ssd_mobilenetv1');
  await faceapi.nets.faceRecognitionNet.loadFromUri('./models/face_recognition');
  await faceapi.nets.faceLandmark68Net.loadFromUri('./models/face_landmark_68');
  status.innerText = "Models Loaded ✅";
}

// CAMERA
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

// INIT
window.onload = async () => {
  await loadModels();
  await startCamera();
};

// ADD FACE (SMART + NO FREEZE)
async function saveFace() {
  const name = document.getElementById("name").value;
  if (!name) return alert("Enter name");

  const steps = ["Look straight", "Turn right", "Turn left"];

  for (let step of steps) {
    status.innerText = step;

    let detected = false;
    let attempts = 0;

    while (!detected && attempts < 10) {
      const detection = await faceapi.detectSingleFace(video)
        .withFaceLandmarks()
        .withFaceDescriptor();

      if (detection) {
        await db.collection("faces").add({
          name: name,
          descriptor: Array.from(detection.descriptor)
        });

        detected = true;
        status.innerText = step + " ✅ captured";
      } else {
        status.innerText = step + " (adjust face...)";
        await new Promise(r => setTimeout(r, 500));
        attempts++;
      }
    }

    if (!detected) {
      alert("Face not detected properly. Try again.");
      return;
    }

    await new Promise(r => setTimeout(r, 1000));
  }

  status.innerText = "All samples saved ✅";
}

// START RECOGNITION (FAST VERSION)
async function startRecognition() {
  status.innerText = "Loading faces...";

  const snapshot = await db.collection("faces").get();
  const map = {};

  snapshot.forEach(doc => {
    const d = doc.data();
    if (!map[d.name]) map[d.name] = [];
    map[d.name].push(new Float32Array(d.descriptor));
  });

  const labeled = Object.keys(map).map(name =>
    new faceapi.LabeledFaceDescriptors(name, map[name])
  );

  const matcher = new faceapi.FaceMatcher(labeled, 0.5);

  status.innerText = "Recognition Running 🚀";

  const canvas = faceapi.createCanvasFromMedia(video);
  document.body.append(canvas);

  const size = { width: video.width, height: video.height };
  faceapi.matchDimensions(canvas, size);

  setInterval(async () => {
    const detections = await faceapi.detectAllFaces(
      video,
      new faceapi.TinyFaceDetectorOptions()
    )
    .withFaceLandmarks()
    .withFaceDescriptors();

    const resized = faceapi.resizeResults(detections, size);

    canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);

    resized.forEach(d => {
      const match = matcher.findBestMatch(d.descriptor);

      new faceapi.draw.DrawBox(d.detection.box, {
        label: match.toString()
      }).draw(canvas);
    });

  }, 150);
}
</script>

</body>
</html>
