<!DOCTYPE html>
<html>
<head>
  <title>Face Recognition</title>

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <style>
    body { background:#111; color:white; text-align:center; }
  </style>
</head>

<body>

<h2>Face Recognition</h2>

<video id="video" width="640" height="480" autoplay muted></video><br>

<input id="name" placeholder="Enter Name">
<button onclick="saveFace()">Add Face</button>
<button onclick="startRecognition()">Start</button>

<p id="status">Loading...</p>

<script>
const status = document.getElementById("status");
const video = document.getElementById("video");

const firebaseConfig = {
  apiKey: "AIzaSyBYjut7RJMj4oJYo9y9nm_2Li691Qt6aCI",
  authDomain: "facerecog-dc727.firebaseapp.com",
  projectId: "facerecog-dc727"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ✅ LOAD MODELS FROM CDN (NO LOCAL FILES)
async function loadModels() {
  const url = "https://justadudewhohacks.github.io/face-api.js/models";

  status.innerText = "Loading models...";
  await faceapi.nets.ssdMobilenetv1.loadFromUri(url);
  await faceapi.nets.faceRecognitionNet.loadFromUri(url);
  await faceapi.nets.faceLandmark68Net.loadFromUri(url);

  status.innerText = "Models Loaded ✅";
}

// CAMERA
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

// INIT
window.onload = async () => {
  await loadModels();
  await startCamera();
};

// ADD FACE
async function saveFace() {
  const name = document.getElementById("name").value;
  if (!name) return alert("Enter name");

  status.innerText = "Detecting face...";

  const detection = await faceapi.detectSingleFace(video)
    .withFaceLandmarks()
    .withFaceDescriptor();

  if (!detection) {
    alert("Face not detected");
    return;
  }

  await db.collection("faces").add({
    name: name,
    descriptor: Array.from(detection.descriptor)
  });

  status.innerText = "Face Saved ✅";
}

// RECOGNITION
async function startRecognition() {
  status.innerText = "Loading faces...";

  const snapshot = await db.collection("faces").get();
  const labeled = [];

  snapshot.forEach(doc => {
    const d = doc.data();
    labeled.push(new faceapi.LabeledFaceDescriptors(
      d.name,
      [new Float32Array(d.descriptor)]
    ));
  });

  const matcher = new faceapi.FaceMatcher(labeled, 0.5);

  const canvas = faceapi.createCanvasFromMedia(video);
  document.body.append(canvas);

  const size = { width: video.width, height: video.height };
  faceapi.matchDimensions(canvas, size);

  setInterval(async () => {
    const detections = await faceapi.detectAllFaces(video)
      .withFaceLandmarks()
      .withFaceDescriptors();

    const resized = faceapi.resizeResults(detections, size);

    canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);

    resized.forEach(d => {
      const match = matcher.findBestMatch(d.descriptor);

      new faceapi.draw.DrawBox(d.detection.box, {
        label: match.toString()
      }).draw(canvas);
    });

  }, 150);
}
</script>

</body>
</html>
