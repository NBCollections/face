<!DOCTYPE html>
<html>
<head>
  <title>Face Recognition</title>

  <!-- Face API -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <!-- Firebase (COMPAT version – stable) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    video {
      border-radius: 10px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h2>Face Recognition</h2>

<video id="video" width="640" height="480" autoplay muted></video><br>

<input type="text" id="name" placeholder="Enter Name">
<button onclick="saveFace()">Add Face</button>
<button onclick="startRecognition()">Start</button>

<p id="status">Loading...</p>

<script>
// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBYjut7RJMj4oJYo9y9nm_2Li691Qt6aCI",
  authDomain: "facerecog-dc727.firebaseapp.com",
  projectId: "facerecog-dc727"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const video = document.getElementById("video");
const status = document.getElementById("status");

// ✅ Load models
async function loadModels() {
  await faceapi.nets.ssdMobilenetv1.loadFromUri('/models/ssd_mobilenetv1');
  await faceapi.nets.faceLandmark68Net.loadFromUri('/models/face_landmark_68');
  await faceapi.nets.faceRecognitionNet.loadFromUri('/models/face_recognition');
  status.innerText = "Models Loaded";
}

// ✅ Start camera
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

// ✅ Initialize
window.onload = async function () {
  await loadModels();
  await startCamera();
};

// ✅ Add face (3 steps)
async function saveFace() {
  const name = document.getElementById("name").value;
  if (!name) return alert("Enter name");

  const steps = ["Look straight", "Turn right", "Turn left"];

  for (let step of steps) {
    status.innerText = step;
    await new Promise(r => setTimeout(r, 2000));

    const detection = await faceapi.detectSingleFace(video)
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (!detection) {
      alert("Face not detected");
      return;
    }

    await db.collection("faces").add({
      name: name,
      descriptor: Array.from(detection.descriptor)
    });
  }

  status.innerText = "Saved!";
}

// ✅ Start recognition
async function startRecognition() {
  status.innerText = "Loading faces...";

  const snapshot = await db.collection("faces").get();
  const map = {};

  snapshot.forEach(doc => {
    const d = doc.data();
    if (!map[d.name]) map[d.name] = [];
    map[d.name].push(new Float32Array(d.descriptor));
  });

  const labeled = Object.keys(map).map(name =>
    new faceapi.LabeledFaceDescriptors(name, map[name])
  );

  const matcher = new faceapi.FaceMatcher(labeled, 0.5);

  const canvas = faceapi.createCanvasFromMedia(video);
  document.body.append(canvas);

  const size = { width: video.width, height: video.height };
  faceapi.matchDimensions(canvas, size);

  setInterval(async () => {
    const detections = await faceapi.detectAllFaces(video)
      .withFaceLandmarks()
      .withFaceDescriptors();

    const resized = faceapi.resizeResults(detections, size);

    canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);

    resized.forEach(d => {
      const match = matcher.findBestMatch(d.descriptor);

      new faceapi.draw.DrawBox(d.detection.box, {
        label: match.toString()
      }).draw(canvas);
    });

  }, 150);
}
</script>

</body>
</html>
